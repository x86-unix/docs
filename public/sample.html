<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サンプル HTML ページ</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #3451b2; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>サンプル HTML ページ</h1>
  <p>これは <code>docs/public/</code> に置かれた静的 HTML ファイルです。</p>
  <div class="card">
    <h2>特徴</h2>
    <ul>
      <li>VitePress のレイアウト・テーマは適用されない</li>
      <li>ビルド時にそのままコピーされる</li>
      <li><code>/sample.html</code> でアクセス可能</li>
    </ul>
  </div>
  <p><a href="/">← VitePress トップに戻る</a></p>
</body>
</html>
